<!DOCTYPE html>
<html>
<head>
<title>Capillary Need Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    font-size:15px;
    margin:6px;
    text-align:center;
}

.container{
    width:100%;
}

/* ✅ TITLE STYLE */
h2{
    margin-bottom:10px;
}

/* table */
table{
    border-collapse:collapse;
    width:100%;
}

td{
    border:1px solid black;
    padding:8px;
    text-align:center;
}

/* color */
.header{ background:#f4b183; font-weight:bold; }
.yellow{ background:yellow; }
.result{ background:#f8cbad; font-weight:bold; }

input{
    width:100%;
    border:none;
    background:yellow;
    text-align:center;
    font-size:16px;
    padding:6px;
}

.btn-row{
    display:flex;
    gap:8px;
    margin-top:12px;
}

button{
    flex:1;
    padding:10px;
    font-size:15px;
}

/* mobile */
@media (max-width:600px){
td{ padding:6px; }
input{ font-size:15px; padding:5px; }
button{ padding:8px; font-size:14px; }
}

</style>
</head>

<body>

<div class="container">

<!-- ✅ TITLE ADDED -->
<h2>Capillary Need Calculator</h2>

<table>

<tr>
<td class="header">Loading Qty</td>
<td colspan="2" class="yellow"><input id="load"></td>
</tr>

<tr>
<td class="header">Qty Wire in 1 unit</td>
<td colspan="2" class="yellow"><input id="wire"></td>
</tr>

<tr>
<td class="header">Machine Model</td>
<td class="header">Shinkawa</td>
<td class="header">ASM</td>
</tr>

<tr>
<td class="header">Qty touchdown / wire</td>
<td class="yellow"><input id="td1" value="3"></td>
<td class="yellow"><input id="td2" value="4"></td>
</tr>

<tr>
<td class="header">Capillary Life Span</td>
<td class="yellow"><input id="life1" value="720000"></td>
<td class="yellow"><input id="life2" value="720000"></td>
</tr>

<tr>
<td class="header">Qty Capillary Need</td>
<td class="result" id="res1"></td>
<td class="result" id="res2"></td>
</tr>

</table>

<div class="btn-row">
<button onclick="clearData()">Clear</button>
<button onclick="goBack()">Back</button>
</div>

</div>

<script>

// ✅ DEFAULT VALUES
const defaults = {
    td1:"3",
    td2:"4",
    life1:"720000",
    life2:"720000"
};

let prev = {};

// ✅ UNIVERSAL INPUT HANDLER
document.querySelectorAll("input").forEach(el => {

    const id = el.id;

    el.addEventListener("focus", () => {
        prev[id] = el.value;
        if(el.value !== "") el.value = "";
    });

    el.addEventListener("blur", () => {

        if(el.value === ""){
            if(defaults[id] !== undefined){
                el.value = defaults[id];
            }else{
                el.value = prev[id] || "";
            }
        }
    });

    el.addEventListener("input", calc);
});

// ✅ CALC
function calculate(load, wire, td, life){
    if(isNaN(load)||isNaN(wire)||isNaN(td)||isNaN(life)) return "";
    return Math.ceil((load*wire*td)/life).toFixed(2);
}

function calc(){

    let load=parseFloat(loadEl.value);
    let wire=parseFloat(wireEl.value);

    let td1=parseFloat(td1El.value);
    let td2=parseFloat(td2El.value);

    let life1=parseFloat(life1El.value);
    let life2=parseFloat(life2El.value);

    res1.innerHTML=calculate(load,wire,td1,life1);
    res2.innerHTML=calculate(load,wire,td2,life2);
}

// refs
const loadEl=document.getElementById("load");
const wireEl=document.getElementById("wire");
const td1El=document.getElementById("td1");
const td2El=document.getElementById("td2");
const life1El=document.getElementById("life1");
const life2El=document.getElementById("life2");

// ✅ CLEAR
function clearData(){
    loadEl.value="";
    wireEl.value="";
    res1.innerHTML="";
    res2.innerHTML="";
    td1El.value="3";
    td2El.value="4";
    life1El.value="720000";
    life2El.value="720000";
}

// ✅ BACK
function goBack(){
    window.location.href="index.html";
}

</script>

</body>
</html>
