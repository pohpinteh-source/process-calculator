<!DOCTYPE html>
<html>
<head>
<title>Capillary Need Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    font-size:14px;
}

.container{
    width:600px;
    margin:auto;
}

table{
    border-collapse:collapse;
    width:100%;
}

td{
    border:1px solid black;
    padding:8px;
    text-align:center;
}

.header{ background:#f4b183; font-weight:bold; }
.yellow{ background:yellow; }
.result{ background:#f8cbad; font-weight:bold; }

input{
    width:100%;
    border:none;
    background:yellow;
    text-align:center;
}

/* buttons */
.btn-row{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

button{
    width:48%;
    padding:10px;
}

</style>
</head>

<body>

<div class="container">

<table>

<tr>
<td class="header">Loading Qty</td>
<td colspan="2" class="yellow">
<input id="load">
</td>
</tr>

<tr>
<td class="header">Qty Wire in 1 unit</td>
<td colspan="2" class="yellow">
<input id="wire">
</td>
</tr>

<tr>
<td class="header">Machine Model</td>
<td class="header">Shinkawa</td>
<td class="header">ASM</td>
</tr>

<!-- ✅ NOW INPUT -->
<tr>
<td class="header">Qty touchdown/wire</td>
<td class="yellow"><input id="td1" value="3"></td>
<td class="yellow"><input id="td2" value="4"></td>
</tr>

<tr>
<td class="header">Capillary Life Span (Touchdown)</td>
<td class="yellow"><input id="life1" value="720000"></td>
<td class="yellow"><input id="life2" value="720000"></td>
</tr>

<tr>
<td class="header">Qty Capillary Need</td>
<td class="result" id="res1"></td>
<td class="result" id="res2"></td>
</tr>

</table>

<div class="btn-row">
<button onclick="clearData()">Clear</button>
<button onclick="goBack()">Back</button>
</div>

</div>

<script>

// ✅ ENTER FLOW
const flow = ["load","wire","td1","td2","life1","life2"];

flow.forEach((id,i)=>{
document.getElementById(id).addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        if(i+1 < flow.length){
            document.getElementById(flow[i+1]).focus();
        }else{
            e.target.blur();
        }
    }
});
});

// ✅ SMART INPUT

let prev={};

const defaults = {
    td1:"3",
    td2:"4",
    life1:"720000",
    life2:"720000"
};

// ✅ load & wire (restore previous)
["load","wire"].forEach(id=>{
let el=document.getElementById(id);

el.onfocus=()=>{
    prev[id]=el.value;
    if(el.value!=="") el.value="";
};

el.onblur=()=>{
    if(el.value===""){
        el.value=prev[id] || "";
    }
};
});

// ✅ touchdown & lifespan (restore DEFAULT)
["td1","td2","life1","life2"].forEach(id=>{

let el=document.getElementById(id);

el.onfocus=()=>{
    if(el.value!=="") el.value="";
};

el.onblur=()=>{
    if(el.value===""){
        el.value=defaults[id];
    }
};

});

// ✅ CALCULATION

function calc(){

let load=parseFloat(loadEl.value);
let wire=parseFloat(wireEl.value);
let td1=parseFloat(td1El.value);
let td2=parseFloat(td2El.value);
let life1=parseFloat(life1El.value);
let life2=parseFloat(life2El.value);

if(
isNaN(load) ||
isNaN(wire) ||
isNaN(td1) ||
isNaN(td2) ||
isNaN(life1) ||
isNaN(life2)
) return;

let shinkawa = Math.ceil((load * wire * td1) / life1);
let asm      = Math.ceil((load * wire * td2) / life2);

res1.innerHTML = shinkawa.toFixed(2);
res2.innerHTML = asm.toFixed(2);

}

// refs
const loadEl=document.getElementById("load");
const wireEl=document.getElementById("wire");
const td1El=document.getElementById("td1");
const td2El=document.getElementById("td2");
const life1El=document.getElementById("life1");
const life2El=document.getElementById("life2");

// trigger
flow.forEach(id=>{
document.getElementById(id).addEventListener("input",calc);
});

// ✅ CLEAR (ONLY THESE TWO)
function clearData(){

loadEl.value="";
wireEl.value="";

res1.innerHTML="";
res2.innerHTML="";

// restore defaults
td1El.value="3";
td2El.value="4";
life1El.value="720000";
life2El.value="720000";

}

// ✅ BACK
function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
``
