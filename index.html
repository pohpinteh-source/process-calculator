<!DOCTYPE html>
<html>
<head>
<title>Process Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    margin: 10px;
}

h1 {
    margin-top: 10px;
}

/* layout */
.container {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
    flex-wrap: wrap;
}

.column {
    width: 23%;
    min-width: 200px;
}

/* title */
.section-title {
    font-size: 18px;
    margin-bottom: 10px;
    font-weight: bold;
}

/* buttons */
button {
    display: block;
    width: 95%;
    margin: 6px auto;
    padding: 10px;
    font-size: 14px;
    background: #e0e0e0;
    border: 1px solid black;
    cursor: pointer;
}

/* mobile */
@media (max-width:600px){

.container {
    flex-direction: column;
    align-items: center;
}

.column {
    width: 90%;
}

button {
    font-size: 15px;
    padding: 12px;
}

}

</style>

</head>

<body>

<h1>Process Calculator</h1>

<div class="container">

<!-- ✅ DA -->
<div class="column">
<div class="section-title">DA</div>

<button onclick="goTo('chip_placement.html')">Chip Placement</button>
<button onclick="goTo('da_collet.html')">DA Collet</button>
<button onclick="goTo('da_xy_stackup.html')">DA XY Stackup</button>
<button onclick="goTo('da_glue_component_scrap.html')">DA Glue Scrap</button>

</div>

<!-- ✅ WB -->
<div class="column">
<div class="section-title">WB</div>

<button onclick="goTo('capillary_profile_selection.html')">
Capillary Profile Selection
</button>

<button onclick="goTo('fab_calculator.html')">
FAB Calculator
</button>

<button onclick="goTo('skw_parameter.html')">
SKW Parameter
</button>

<button onclick="goTo('bar_calculator.html')">
B.A.R Calculator
</button>

<button onclick="goTo('fusing_current.html')">
Fusing Current
</button>

<button onclick="goTo('capillary_need.html')">
Capillary Need
</button>

<!-- ✅ NEW TOOL -->
<button onclick="goTo('normalize_ball_shear.html')">
Normalize Ball Shear
</button>

</div>

<!-- ✅ SPEC -->
<div class="column">
<div class="section-title">Spec</div>

<button onclick="goTo('define_da_spec.html')">Define DA Spec</button>
<button onclick="goTo('define_wb_spec.html')">Define WB Spec</button>
<button onclick="goTo('spc_lsl.html')">SPC LSL</button>

</div>

<!-- ✅ INFO -->
<div class="column">
<div class="section-title">Info</div>

<button onclick="openPDF()">Wire Bond Guideline</button>

</div>

</div>

<script>

// ✅ navigation
function goTo(page){
    window.location.href = page;
}

// ✅ open pdf
function openPDF(){
    window.open("Wire Bond Guideline.pdf","_blank");
}

</script>

</body>
</html>
