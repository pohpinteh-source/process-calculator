<!DOCTYPE html>
<html>
<head>
<title>Define DA Spec</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial;
    background: #f5f5f5;
}

/* ✅ LAYOUT */
.container {
    display: flex;
    gap:15px;
}

/* ✅ MOBILE FIX */
@media(max-width:768px){
    .container{
        flex-direction: column;
    }

    table{
        width:100%;
    }

    .right{
        margin-left:0;
    }
}

/* table */
table {
    border-collapse: collapse;
    width: 60%;
}

td {
    border: 1px solid black;
    padding: 6px;
}

/* colors */
.label { background: #9eb6ce; }
.input-box { background: yellow; text-align:center; }
.result-box { background: #d9c2ad; text-align:center; }

/* input */
input {
    width: 100%;
    border: none;
    background: yellow;
    text-align: center;
    font-size: 16px;
}

/* right panel */
.right {
    margin-left: 20px;
}

/* buttons */
button {
    display: block;
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

/* ✅ ROUNDUP */
.roundbox {
    background: green;
    color: yellow;
    padding: 12px;
    width: 100%;
    text-align: center;
    border: 2px solid black;
}

.roundbox div:first-child {
    font-size: 22px;
}

.roundbox div:last-child {
    font-size: 26px;
    margin-top: 5px;
}

/* image */
img {
    width: 100%;
    max-width:300px;
    display: block;
    margin: 15px auto;
}

</style>
</head>

<body onload="setFocus()">

<h2>** Key in Yellow box.</h2>

<div class="container">

<!-- ✅ TABLE -->
<table>

<tr>
<td class="label">Chip edge 1 [mm]</td>
<td class="input-box"><input id="mm1"></td>
<td>mm</td>
</tr>

<tr>
<td class="label">Chip edge 2 [mm]</td>
<td class="input-box"><input id="mm2"></td>
<td>mm</td>
</tr>

<tr>
<td class="label">Chip edge 1 [in]</td>
<td class="result-box" id="in1"></td>
<td>in</td>
</tr>

<tr>
<td class="label">Chip edge 2 [in]</td>
<td class="result-box" id="in2"></td>
<td>in</td>
</tr>

<tr>
<td class="label">Area [mm²]</td>
<td class="result-box" id="area_mm"></td>
<td>mm²</td>
</tr>

<tr>
<td class="label">Area [in²]</td>
<td class="result-box" id="area_in"></td>
<td>in²</td>
</tr>

<tr>
<td class="label">Chip area 10⁻⁴ [in²]</td>
<td class="result-box" id="chip_area"></td>
<td>in²</td>
</tr>

<tr>
<td class="label">1.0x [gf]</td>
<td class="result-box" id="one"></td>
<td>gf</td>
</tr>

<tr>
<td class="label">2.0x [gf] - Target</td>
<td class="result-box" id="two"></td>
<td>gf</td>
</tr>

<tr>
<td class="label">2.0x+14% [gf]</td>
<td class="result-box" id="plus14"></td>
<td>gf</td>
</tr>

<tr>
<td class="label">2.0x+25% [gf] - For Prod</td>
<td class="result-box" id="plus25"></td>
<td>gf</td>
</tr>

</table>

<!-- ✅ RIGHT PANEL -->
<div class="right">

<!-- ✅ ROUNDUP -->
<div class="roundbox">
    <div>Roundup</div>
    <div id="roundupValue">0.00 gf</div>
</div>

<!-- ✅ IMAGE -->
<img src="DA_spec_chart.png">

<!-- ✅ PDF -->
<button onclick="openPDF('Die Shear Spec MIL883.pdf')">
    Die Shear Spec MIL883
</button>

<button onclick="openPDF('Die Shear Spec MIL883 (Chinese).pdf')">
    Die Shear Spec MIL883 (Chinese)
</button>

<!-- ✅ CONTROL -->
<button onclick="clearData()">Clear</button>
<button onclick="goBack()">Back</button>

</div>

</div>

<script>

// ✅ focus
function setFocus(){
    document.getElementById("mm1").focus();
}

// ✅ SMART INPUT (clear + restore ✅)
let prev = {};

document.querySelectorAll("input").forEach(el=>{

    const id = el.id;

    el.addEventListener("focus", ()=>{
        prev[id] = el.value;
        if(el.value !== "") el.value = "";
    });

    el.addEventListener("blur", ()=>{
        if(el.value === ""){
            el.value = prev[id] || "";
        }
    });

});

// ✅ ENTER FLOW
const flow = ["mm1","mm2"];

flow.forEach((id,i)=>{
    document.getElementById(id).addEventListener("keydown", e=>{
        if(e.key==="Enter"){
            e.preventDefault();

            if(i+1<flow.length){
                document.getElementById(flow[i+1]).focus();
            }else{
                e.target.blur();
            }
        }
    });
});

// ✅ calc
function calc(){

let mm1 = Number(mm1El.value);
let mm2 = Number(mm2El.value);

if(!mm1 || !mm2) return;

let in1 = mm1 / 25.4;
let in2 = mm2 / 25.4;

let area_mm = mm1 * mm2;
let area_in = in1 * in2;

let chip_area = area_in * 10000;

let one = 0.04 * chip_area * 1000;
let two = 0.08 * chip_area * 1000;

let plus14 = two + (two / 7);
let plus25 = two + (two / 4);

let roundup = Math.ceil(plus25);

// update
in1El.innerHTML = in1.toFixed(4);
in2El.innerHTML = in2.toFixed(4);
area_mmEl.innerHTML = area_mm.toFixed(2);
area_inEl.innerHTML = area_in.toFixed(4);
chip_areaEl.innerHTML = chip_area.toFixed(2);

oneEl.innerHTML = one.toFixed(2);
twoEl.innerHTML = two.toFixed(2);
plus14El.innerHTML = plus14.toFixed(2);
plus25El.innerHTML = plus25.toFixed(2);

roundupEl.innerHTML = roundup.toFixed(2) + " gf";
}

// ✅ refs
const mm1El=document.getElementById("mm1");
const mm2El=document.getElementById("mm2");

const in1El=document.getElementById("in1");
const in2El=document.getElementById("in2");
const area_mmEl=document.getElementById("area_mm");
const area_inEl=document.getElementById("area_in");
const chip_areaEl=document.getElementById("chip_area");
const oneEl=document.getElementById("one");
const twoEl=document.getElementById("two");
const plus14El=document.getElementById("plus14");
const plus25El=document.getElementById("plus25");
const roundupEl=document.getElementById("roundupValue");

// ✅ auto calc
["mm1","mm2"].forEach(id=>{
document.getElementById(id).addEventListener("input", calc);
});

// ✅ clear
function clearData(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll(".result-box").forEach(i=>i.innerHTML="");
roundupEl.innerHTML="0.00 gf";
prev = {}; // reset stored values ✅
}

// ✅ back
function goBack(){
window.location.href="index.html";
}

// ✅ open pdf
function openPDF(file){
window.open(file,"_blank");
}

</script>

</body>
</html>
