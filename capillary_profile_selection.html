<!DOCTYPE html>
<html>
<head>
<title>Capillary Profile Selection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
}

/* ✅ MOBILE STACK */
.container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* table */
table{
    border-collapse:collapse;
    width:100%;
}
td{
    border:1px solid black;
    padding:8px;
}

/* colors */
.label{background:orange;}
.input-box{background:yellow;text-align:center;}
.result{background:#8fd14f;text-align:center;font-weight:bold;}

input{
    width:100%;
    border:none;
    background:yellow;
    text-align:center;
    font-size:18px;   /* ✅ bigger for phone */
}

/* L3 */
#l3input{
    width:70px;
}

/* ✅ CENTER IMAGE */
.center-img{
    text-align:center;
}
.center-img img{
    width:100px;   /* ✅ adjusted for phone */
}

/* ✅ RIGHT IMAGE */
.right-img{
    position:relative;
    text-align:center;
}
.right-img img{
    width:100%;
    max-width:330px;
}

/* L display */
.overlay{
    position:absolute;
    bottom:75px;
    right:50px;
    display:flex;
    align-items:center;
    gap:5px;
}

/* text */
.valueL{
    color:green;
    font-weight:bold;
    font-size:18px;
}
.equal{font-size:18px;}
.unit{font-size:16px;}

/* result */
.result-panel{
    margin-top:10px;
}

/* buttons */
.btn-row{
    display:flex;
    gap:15px;
    margin-top:20px;
}

button{
    width:100%;
    padding:12px;
    font-size:16px;
}

/* ✅ DESKTOP fallback */
@media(min-width:768px){
    .container{
        flex-direction:row;
    }
}

</style>
</head>

<body onload="cd.focus()">

<h2>** Key in Yellow box</h2>

<div class="container">

<!-- ✅ INPUT TABLE (TOP) -->
<table>

<tr><td class="label">ØCD</td><td class="input-box"><input id="cd"></td><td>um</td></tr>
<tr><td class="label">ØH</td><td class="input-box"><input id="h"></td><td>um</td></tr>
<tr><td class="label">CA</td><td class="input-box"><input id="ca"></td><td>Deg</td></tr>
<tr><td class="label">ØTip</td><td class="input-box"><input id="tip"></td><td>um</td></tr>
<tr><td class="label">MTA</td><td class="input-box"><input id="mta"></td><td>Deg</td></tr>

<tr><td class="label">TL</td>
<td class="input-box"><input id="tl" value="11.000"></td>
<td>mm</td></tr>

<tr><td class="label">ØTD</td>
<td class="input-box"><input id="td" value="1.587"></td>
<td>mm</td></tr>

</table>

<!-- ✅ RESULT -->
<div class="result-panel">

<div>L₁ = <span class="result" id="l1">0.0000</span> mm</div><br>
<div>X₁ = <span class="result" id="x1">0.0000</span> mm</div><br>
<div>L₂ = <span class="result" id="l2">0.0000</span> mm</div><br>
<div>X₂ = <span class="result" id="x2">0.0000</span> mm</div><br>

<div>L₃ = <input id="l3input"> mm</div>

<div class="btn-row">
<button onclick="clearData()">Clear</button>
<button onclick="goBack()">Back</button>
</div>

</div>

<!-- ✅ IMAGE 1 -->
<div class="center-img">
<img src="Capillary Profile Selection1.png">
</div>

<!-- ✅ IMAGE 2 -->
<div class="right-img">
<img src="Capillary Profile Selection2.png">



<div class="overlay">
    <div class="labelBlack">L =</div>
    <span class="result" id="Lright">0.0000</span>
    <span class="unit">mm</span>
</div>


</div>

</div>

</div>

<script>

// ✅ YOUR ORIGINAL SCRIPT (UNCHANGED)

const flow=["cd","h","ca","tip","mta","tl","td","l3input"];

flow.forEach((id,i)=>{
    document.getElementById(id).addEventListener("keydown", e=>{
        if(e.key==="Enter"){
            e.preventDefault();
            if(i+1 < flow.length){
                document.getElementById(flow[i+1]).focus();
            }else{
                e.target.blur();
            }
        }
    });
});

document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("focus", function(){
        this.value="";
    });
});

tl.onblur = ()=>{ if(tl.value==="") tl.value="11.000"; };
td.onblur = ()=>{ if(td.value==="") td.value="1.587"; };

l3input.onblur=function(){
    let v=parseFloat(this.value);
    if(!isNaN(v)) this.value=v.toFixed(3);
};

function calc(){

let CD=Number(cd.value);
let H=Number(h.value);
let CA=Number(ca.value);
let TIP=Number(tip.value);
let MTA=Number(mta.value);
let TL=Number(tl.value);
let TD=Number(td.value);
let L3=Number(l3input.value);

let CDmm=CD/1000;
let Hmm=H/1000;
let TIPmm=TIP/1000;

if(TD){
let X1=TD/2;
x1.innerHTML=X1.toFixed(4);
}

let L2=null;
if(MTA && TD && TIPmm && L3){
L2=Math.tan((90-(MTA/2))*Math.PI/180)*((TD/2)-(TIPmm/2))-L3;
l2.innerHTML=L2.toFixed(4);
}

if(TL && L2!==null && L3){
let L1=TL-L2-L3;
l1.innerHTML=L1.toFixed(4);
}

if(MTA && TIPmm && L3){
let X2=(L3/Math.tan((90-(MTA/2))*Math.PI/180))+(TIPmm/2);
x2.innerHTML=X2.toFixed(4);
}

if(CA && CDmm && Hmm){
let L=Math.tan((90-(CA/2))*Math.PI/180)*((CDmm/2)-(Hmm/2));
Lright.innerHTML=L.toFixed(4);
}
}

["cd","h","ca","tip","mta","tl","td","l3input"]
.forEach(id=>{
document.getElementById(id).addEventListener("input",calc);
});

function clearData(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll(".result").forEach(i=>i.innerHTML="0.0000");

tl.value="11.000";
td.value="1.587";
Lright.innerHTML="0.0000";
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
